name: readme

# Auto-fill ONLY the marked block in README.md with a grouped project list,
# preserving the handcrafted banner/bio/closing. Daily + on demand.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # NOTE: assets/header-*.svg are NOT generated here anymore. They are owned
      # by bounded-systems/brand's deploy-headers workflow (single source of
      # truth: brand/tokens.json for colors, brand/content/strings.json for
      # copy). Two generators writing the same files drifted and rendered a
      # blank/black banner; consolidating to one owner fixed it. This workflow
      # now only injects the grouped project list into README.md.
      - uses: bdelanghe/synoptic-github@v2
        env:
          FEATURED: ssh-doctor,first-pass,git-tidy,synoptic-github
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          inject-into: README.md
          group-by: topic
          orgs: bounded-systems
          featured: ssh-doctor,first-pass,git-tidy,synoptic-github
          # Optional: curate which repos appear by topic, e.g.
          # filter: capability-security,agent-infra,developer-tools,ai,cli
