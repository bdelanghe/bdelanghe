name: readme

# Auto-fill ONLY the marked block in README.md with a grouped project list,
# preserving the handcrafted banner/bio/closing. Daily + on demand.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Banner is derived from tokens, never hand-painted: strings come from
      # site/data/profile.json (content tokens), colors from bounded-systems/brand
      # (design tokens). Regenerated here so assets/header-*.svg can't drift.
      - name: Check out site (token sources + banner generator)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: bdelanghe/site
          path: _site
      - name: Fetch brand design tokens
        run: curl -fsSL https://raw.githubusercontent.com/bounded-systems/brand/main/tokens/tokens.json -o _tokens.json
      - name: Generate banner from tokens
        run: node _site/banner.mjs --profile _site/data/profile.json --tokens _tokens.json --out assets

      - uses: bdelanghe/synoptic-github@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          inject-into: README.md
          group-by: topic
          orgs: bounded-systems
          # Optional: curate which repos appear by topic, e.g.
          # filter: capability-security,agent-infra,developer-tools,ai,cli
